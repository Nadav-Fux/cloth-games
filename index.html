<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>nVision · cloth</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0c;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .tabs {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(244, 243, 239, 0.15);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .tabs:hover { opacity: 1; }

    .tab {
      padding: 6px 14px;
      border: 0;
      background: transparent;
      color: rgba(244, 243, 239, 0.7);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .tab:hover {
      color: #f2e9cf;
      background: rgba(244, 243, 239, 0.08);
    }

    .tab.active {
      color: #0a0a0c;
      background: #f2e9cf;
    }

    @media (max-width: 480px) {
      .tab { padding: 5px 9px; font-size: 10px; letter-spacing: 0.16em; }
      .tabs { gap: 2px; padding: 4px 6px; }
    }
  </style>
</head>
<body>
  <iframe id="frame" title="nVision content" allow="fullscreen"></iframe>

  <nav class="tabs" role="tablist" aria-label="modes">
    <button class="tab" data-target="cloth" role="tab">cloth</button>
    <button class="tab" data-target="slingshot" role="tab">slingshot</button>
    <button class="tab" data-target="pluck" role="tab">pluck</button>
    <button class="tab" data-target="catch" role="tab">catch</button>
  </nav>

  <script>
    (() => {
      const frame = document.getElementById("frame");
      const tabs = document.querySelectorAll(".tab");
      const valid = new Set(["cloth", "slingshot", "pluck", "catch"]);
      const titles = {
        cloth: "nVision · cloth",
        slingshot: "nVision · slingshot",
        pluck: "nVision · pluck",
        catch: "nVision · catch"
      };

      function targetFromHash() {
        const h = (location.hash || "#cloth").replace(/^#/, "");
        return valid.has(h) ? h : "cloth";
      }

      function activate(name) {
        if (!valid.has(name)) name = "cloth";
        const path = name + "/index.html";
        if (frame.getAttribute("src") !== path) frame.setAttribute("src", path);
        tabs.forEach((t) => t.classList.toggle("active", t.dataset.target === name));
        document.title = titles[name] || titles.cloth;
        if (location.hash.replace(/^#/, "") !== name) {
          history.replaceState(null, "", "#" + name);
        }
      }

      tabs.forEach((t) => {
        t.addEventListener("click", () => activate(t.dataset.target));
      });

      window.addEventListener("hashchange", () => activate(targetFromHash()));
      activate(targetFromHash());
    })();
  </script>
</body>
</html>
