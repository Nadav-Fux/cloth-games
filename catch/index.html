<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>nVision · catch</title>
  <style>
    :root {
      --bg-a: #061015;
      --bg-b: #0a1820;
      --bg-c: #04080c;
      --text: #f4f3ef;
      --accent: #6ee7b7;
      --warn: #fbbf24;
      --bad: #f87171;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
    }

    #cloth {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #cloth.dragging { cursor: grabbing; }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 8;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .hud .score {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .hud .meta {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .lives {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 8;
      display: flex;
      gap: 6px;
      pointer-events: none;
    }

    .life {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(110, 231, 183, 0.7);
      transition: opacity 0.3s ease, background 0.3s ease;
    }
    .life.lost { background: rgba(244, 243, 239, 0.12); box-shadow: none; }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(6, 16, 21, 0.78);
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .overlay p {
      margin: 0;
      max-width: 86vw;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.65;
      line-height: 1.7;
    }

    .overlay button {
      margin-top: 12px;
      padding: 14px 38px;
      background: transparent;
      border: 1px solid rgba(110, 231, 183, 0.55);
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
    }

    .overlay button:hover { background: rgba(110, 231, 183, 0.1); }

    .floater {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 7;
      font-family: ui-monospace, monospace;
      font-size: 14px;
      font-weight: 600;
      animation: floatUp 0.9s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 56px)) scale(1.4); }
    }
    .game-tabs { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 2px; padding: 3px 4px; background: rgba(0,0,0,0.45); border: 1px solid rgba(244,243,239,0.18); border-radius: 999px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .game-tabs a { padding: 3px 8px; border-radius: 999px; color: rgba(244,243,239,0.65); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: background 0.15s ease, color 0.15s ease; }
    .game-tabs a:hover { color: #f2e9cf; background: rgba(244,243,239,0.08); }
    .game-tabs a.active { color: #0a0a0c; background: #f2e9cf; }
  </style>
</head>
<body>
  <nav class="game-tabs"><a href="../cloth/">cloth</a><a href="../slingshot/">slingshot</a><a href="../pluck/">pluck</a><a href="../catch/" class="active">catch</a></nav>
  <main class="stage">
    <canvas id="cloth"></canvas>
  </main>

  <div class="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="combo"></div>
  </div>

  <div class="lives" id="lives">
    <div class="life"></div>
    <div class="life"></div>
    <div class="life"></div>
  </div>

  <div class="overlay" id="overlay">
    <h1>catch</h1>
    <p>stars fall from above.<br/>let the cloth touch them.<br/>pull and release to wave it.<br/>3 lives.</p>
    <button id="startBtn">begin</button>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("cloth");
      const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });
      const stage = document.querySelector(".stage");
      const ui = {
        score: document.getElementById("score"),
        combo: document.getElementById("combo"),
        lives: document.getElementById("lives"),
        overlay: document.getElementById("overlay"),
        startBtn: document.getElementById("startBtn")
      };

      const DPR_LIMIT = 2;
      const COLS = 28;
      const ROWS = 28;
      const ITERATIONS = 4;
      const GRAVITY = 720;
      const DRAG = 0.992;
      const POINTER_RADIUS = 92;
      const STIFFNESS = 0.84;

      let width = 1, height = 1, dpr = 1, focal = 880;
      let centerX = 0, centerY = 0;
      let restX = 25, restY = 20;
      let floorY = 1;
      let particles = [], constraints = [], projected = [];
      let lastTime = performance.now();

      const pointers = new Map();

      const game = {
        running: false,
        score: 0,
        combo: 0,
        lives: 3,
        stars: [],
        bursts: [],
        spawnTimer: 0,
        spawnInterval: 1.6,
        startTime: 0
      };

      class Particle {
        constructor(x, y, z, col, row, pinned) {
          this.x = x; this.y = y; this.z = z;
          this.oldX = x; this.oldY = y; this.oldZ = z;
          this.baseX = x; this.baseY = y; this.baseZ = z;
          this.ax = 0; this.ay = 0; this.az = 0;
          this.col = col; this.row = row;
          this.pinned = pinned;
          this.pinX = x; this.pinY = y; this.pinZ = z;
        }
        addForce(x, y, z) { this.ax += x; this.ay += y; this.az += z; }
        integrate(dt) {
          if (this.pinned) {
            this.x = this.pinX; this.y = this.pinY; this.z = this.pinZ;
            this.oldX = this.x; this.oldY = this.y; this.oldZ = this.z;
            this.ax = 0; this.ay = 0; this.az = 0;
            return;
          }
          const vx = (this.x - this.oldX) * DRAG;
          const vy = (this.y - this.oldY) * DRAG;
          const vz = (this.z - this.oldZ) * DRAG;
          this.oldX = this.x; this.oldY = this.y; this.oldZ = this.z;
          this.x += vx + this.ax * dt * dt;
          this.y += vy + this.ay * dt * dt;
          this.z += vz + this.az * dt * dt;
          this.ax = 0; this.ay = 0; this.az = 0;
        }
      }

      class Constraint {
        constructor(a, b, rest, type) {
          this.a = a; this.b = b; this.rest = rest; this.type = type;
        }
        solve(stiffness) {
          const a = this.a, b = this.b;
          let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.0001;
          const tf = this.type === "bend" ? 0.42 : this.type === "shear" ? 0.72 : 1;
          const diff = ((dist - this.rest) / dist) * stiffness * tf;
          dx *= diff; dy *= diff; dz *= diff;
          const aF = !a.pinned, bF = !b.pinned;
          if (aF && bF) {
            a.x += dx*0.5; a.y += dy*0.5; a.z += dz*0.5;
            b.x -= dx*0.5; b.y -= dy*0.5; b.z -= dz*0.5;
          } else if (aF) {
            a.x += dx; a.y += dy; a.z += dz;
          } else if (bF) {
            b.x -= dx; b.y -= dy; b.z -= dz;
          }
        }
      }

      const idx = (c, r) => r * COLS + c;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        focal = Math.max(720, width * 0.86);
        centerX = width * 0.5;
        centerY = height * 0.12;
        buildCloth();
      }

      function buildCloth() {
        particles = []; constraints = []; projected = new Array(COLS * ROWS);
        const isMobile = width < 640;
        const topMargin = isMobile ? Math.max(60, height * 0.12) : Math.max(80, height * 0.15);
        const reserve = isMobile ? Math.max(60, height * 0.08) : Math.max(90, height * 0.10);
        const availH = height - topMargin - reserve;
        const clothWidth = isMobile ? width * 0.98 : Math.min(width * 0.92, 1060);
        const maxClothH = isMobile ? Math.max(620, height * 0.74) : Math.max(560, height * 0.7);
        const clothHeight = Math.max(220, Math.min(availH, maxClothH));
        restX = clothWidth / (COLS - 1);
        restY = clothHeight / (ROWS - 1);
        const startX = centerX - clothWidth * 0.5;
        const startY = topMargin;
        floorY = startY + clothHeight + 32;

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const u = c / (COLS - 1);
            const v = r / (ROWS - 1);
            const x = startX + c * restX;
            const y = startY + r * restY;
            const z = Math.sin(u * Math.PI * 2.4) * 16 * (0.25 + v);
            const pinned = r === 0 && (c % 2 === 0 || c === COLS - 1 || c === 0);
            particles.push(new Particle(x, y, z, c, r, pinned));
          }
        }

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const p = particles[idx(c, r)];
            if (c < COLS - 1) constraints.push(new Constraint(p, particles[idx(c+1, r)], restX, "structural"));
            if (r < ROWS - 1) constraints.push(new Constraint(p, particles[idx(c, r+1)], restY, "structural"));
            if (c < COLS - 1 && r < ROWS - 1) {
              const diag = Math.sqrt(restX*restX + restY*restY);
              constraints.push(new Constraint(p, particles[idx(c+1, r+1)], diag, "shear"));
              constraints.push(new Constraint(particles[idx(c+1, r)], particles[idx(c, r+1)], diag, "shear"));
            }
            if (c < COLS - 2) constraints.push(new Constraint(p, particles[idx(c+2, r)], restX*2, "bend"));
            if (r < ROWS - 2) constraints.push(new Constraint(p, particles[idx(c, r+2)], restY*2, "bend"));
          }
        }
      }

      function project(p) {
        const scale = focal / (focal + p.z);
        return {
          x: centerX + (p.x - centerX) * scale,
          y: centerY + (p.y - centerY) * scale,
          s: scale, z: p.z
        };
      }

      function screenToWorld(x, y, zRef) {
        const scale = focal / (focal + zRef);
        return {
          x: (x - centerX) / scale + centerX,
          y: (y - centerY) / scale + centerY,
          z: zRef
        };
      }

      function findNearestParticle(x, y) {
        let nearest = null;
        let best = POINTER_RADIUS * POINTER_RADIUS;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          if (p.pinned) continue;
          const q = project(p);
          const dx = q.x - x, dy = q.y - y;
          const d = dx*dx + dy*dy;
          if (d < best) { best = d; nearest = p; }
        }
        return nearest;
      }

      function applyForces(dt) {
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.addForce(0, GRAVITY, 0);
          const vx = p.x - p.oldX, vy = p.y - p.oldY, vz = p.z - p.oldZ;
          p.addForce(-vx * 0.014 / Math.max(dt, 0.001), -vy * 0.014 / Math.max(dt, 0.001), -vz * 0.014 / Math.max(dt, 0.001));
        }
      }

      function satisfyPointers() {
        for (const ptr of pointers.values()) {
          if (!ptr.grabbed) continue;
          const target = screenToWorld(ptr.x + ptr.offsetX, ptr.y + ptr.offsetY, ptr.offsetZ);
          const p = ptr.grabbed;
          const pull = 0.9;
          p.x += (target.x - p.x) * pull;
          p.y += (target.y - p.y) * pull;
          p.z += (target.z + (ptr.x - ptr.px) * 2.0 - p.z) * 0.4;
          const grabCol = p.col, grabRow = p.row;
          for (let r = Math.max(0, grabRow - 2); r <= Math.min(ROWS - 1, grabRow + 2); r++) {
            for (let c = Math.max(0, grabCol - 2); c <= Math.min(COLS - 1, grabCol + 2); c++) {
              const n = particles[idx(c, r)];
              if (n === p || n.pinned) continue;
              const dist = Math.hypot(c - grabCol, r - grabRow);
              const k = Math.max(0, 1 - dist / 3) * 0.18;
              n.x += (p.x - n.x) * k;
              n.y += (p.y - n.y) * k;
              n.z += (p.z - n.z) * k;
            }
          }
        }
      }

      function collide() {
        const minZ = -380, maxZ = 420;
        const leftBound = -restX, rightBound = width + restX;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          if (p.y > floorY) {
            p.y = floorY;
            p.oldY = p.y + (p.oldY - p.y) * 0.34;
            p.oldX = p.x + (p.oldX - p.x) * 0.84;
          }
          if (p.z < minZ) { p.z = minZ; p.oldZ = p.z + (p.oldZ - p.z) * 0.4; }
          else if (p.z > maxZ) { p.z = maxZ; p.oldZ = p.z + (p.oldZ - p.z) * 0.4; }
          if (p.x < leftBound) { p.x = leftBound; p.oldX = p.x; }
          else if (p.x > rightBound) { p.x = rightBound; p.oldX = p.x; }
        }
      }

      function simulate(dt) {
        const fixedDt = Math.min(dt, 1/30);
        for (let step = 0; step < 2; step++) {
          const subDt = fixedDt * 0.5;
          applyForces(subDt);
          for (let i = 0; i < particles.length; i++) particles[i].integrate(subDt);
          satisfyPointers();
          for (let n = 0; n < ITERATIONS; n++) {
            for (let i = 0; i < constraints.length; i++) constraints[i].solve(STIFFNESS);
            satisfyPointers();
            collide();
          }
        }
      }

      function normalForCell(p00, p10, p01) {
        const ax = p10.x-p00.x, ay = p10.y-p00.y, az = p10.z-p00.z;
        const bx = p01.x-p00.x, by = p01.y-p00.y, bz = p01.z-p00.z;
        let nx = ay*bz - az*by, ny = az*bx - ax*bz, nz = ax*by - ay*bx;
        const len = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
        return { x: nx/len, y: ny/len, z: nz/len };
      }

      function colorForCell(light, depth) {
        const shade = Math.max(0.2, Math.min(1, light * 0.6 + 0.5));
        const depthShade = Math.max(0.7, Math.min(1, 1 - depth * 0.0009));
        const k = shade * depthShade;
        const r = 18 + 88 * k;
        const g = 36 + 168 * k;
        const b = 50 + 158 * k;
        return `rgb(${r|0}, ${g|0}, ${b|0})`;
      }

      function drawBackground() {
        ctx.clearRect(0, 0, width, height);
        const bg = ctx.createLinearGradient(0, 0, width, height);
        bg.addColorStop(0, "#061015");
        bg.addColorStop(0.55, "#0a1820");
        bg.addColorStop(1, "#04080c");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);
      }

      function drawCloth() {
        for (let i = 0; i < particles.length; i++) projected[i] = project(particles[i]);
        for (let r = 0; r < ROWS - 1; r++) {
          for (let c = 0; c < COLS - 1; c++) {
            const i00 = idx(c, r), i10 = idx(c+1, r), i11 = idx(c+1, r+1), i01 = idx(c, r+1);
            const p00 = particles[i00], p10 = particles[i10], p01 = particles[i01];
            const q00 = projected[i00], q10 = projected[i10], q11 = projected[i11], q01 = projected[i01];
            const n = normalForCell(p00, p10, p01);
            const light = n.x * -0.24 + n.y * -0.18 + n.z * 0.88;
            const depth = (p00.z + p10.z + particles[i11].z + p01.z) * 0.25;
            ctx.beginPath();
            ctx.moveTo(q00.x, q00.y);
            ctx.lineTo(q10.x, q10.y);
            ctx.lineTo(q11.x, q11.y);
            ctx.lineTo(q01.x, q01.y);
            ctx.closePath();
            ctx.fillStyle = colorForCell(light, depth);
            ctx.fill();
          }
        }
      }

      // ── stars ──
      function spawnStar() {
        const x = width * (0.1 + 0.8 * Math.random());
        const y = -40;
        const z = -120 + Math.random() * 240;
        game.stars.push({
          x, y, z,
          vx: (Math.random() - 0.5) * 30,
          vy: 90 + Math.random() * 80,
          alive: true,
          caught: false,
          size: 7 + Math.random() * 5,
          pulse: Math.random() * Math.PI * 2
        });
      }

      function updateStars(dt) {
        for (let i = game.stars.length - 1; i >= 0; i--) {
          const s = game.stars[i];
          if (!s.alive) { game.stars.splice(i, 1); continue; }
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.vy += 220 * dt;
          s.pulse += dt * 4;

          // collision with cloth particles (rough but effective)
          if (!s.caught) {
            for (let j = 0; j < particles.length; j++) {
              const p = particles[j];
              if (p.pinned) continue;
              const dx = p.x - s.x, dy = p.y - s.y, dz = p.z - s.z;
              const d2 = dx*dx + dy*dy + dz*dz;
              const r = s.size + 16;
              if (d2 < r * r) {
                s.caught = true;
                catchStar(s);
                // give the cloth an impulse
                const d = Math.sqrt(d2) || 1;
                const nx = dx / d, ny = dy / d, nz = dz / d;
                const impulse = 22;
                p.x += nx * impulse * 0.5;
                p.y += ny * impulse * 0.5;
                p.z += nz * impulse * 0.5;
                break;
              }
            }
          }

          // floor miss
          if (s.y > floorY + 60 && !s.caught) {
            missStar(s);
            s.alive = false;
          } else if (s.y > height + 80) {
            s.alive = false;
          }
        }

        if (game.running) {
          game.spawnTimer += dt;
          if (game.spawnTimer >= game.spawnInterval) {
            game.spawnTimer = 0;
            spawnStar();
            game.spawnInterval = Math.max(0.55, game.spawnInterval * 0.985);
          }
        }
      }

      function drawStars() {
        for (const s of game.stars) {
          if (!s.alive) continue;
          const scale = focal / (focal + s.z);
          const sx = centerX + (s.x - centerX) * scale;
          const sy = centerY + (s.y - centerY) * scale;
          const sr = s.size * scale;
          const pulse = 0.85 + 0.15 * Math.sin(s.pulse);

          // halo
          const halo = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr * 3);
          if (s.caught) {
            halo.addColorStop(0, `rgba(110, 231, 183, ${0.6 * pulse})`);
            halo.addColorStop(1, "rgba(110, 231, 183, 0)");
          } else {
            halo.addColorStop(0, `rgba(255, 240, 200, ${0.6 * pulse})`);
            halo.addColorStop(1, "rgba(255, 240, 200, 0)");
          }
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(sx, sy, sr * 3, 0, Math.PI * 2);
          ctx.fill();

          // star body
          drawStarShape(sx, sy, sr, pulse, s.caught);
        }
      }

      function drawStarShape(cx, cy, r, pulse, caught) {
        ctx.fillStyle = caught ? `rgba(110, 231, 183, ${pulse})` : `rgba(255, 245, 215, ${pulse})`;
        ctx.beginPath();
        const points = 5;
        for (let i = 0; i < points * 2; i++) {
          const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
          const rad = i % 2 === 0 ? r : r * 0.45;
          const x = cx + Math.cos(a) * rad;
          const y = cy + Math.sin(a) * rad;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
      }

      function catchStar(s) {
        if (!game.running) return;
        game.combo++;
        const mult = Math.min(5, 1 + Math.floor(game.combo / 4));
        const points = 10 * mult;
        game.score += points;
        ui.score.textContent = game.score;
        ui.combo.textContent = mult > 1 ? `×${mult}  · combo ${game.combo}` : `combo ${game.combo}`;
        const scale = focal / (focal + s.z);
        const sx = centerX + (s.x - centerX) * scale;
        const sy = centerY + (s.y - centerY) * scale;
        popScore(sx, sy, `+${points}`, "#6ee7b7");
        addBurst(s.x, s.y, s.z, "110, 231, 183");
      }

      function missStar(s) {
        if (!game.running) return;
        game.combo = 0;
        ui.combo.textContent = "missed";
        loseLife();
        const scale = focal / (focal + s.z);
        const sx = centerX + (s.x - centerX) * scale;
        const sy = centerY + (s.y - centerY) * scale;
        popScore(sx, sy, "miss", "#f87171");
        addBurst(s.x, s.y, s.z, "248, 113, 113");
      }

      function loseLife() {
        game.lives = Math.max(0, game.lives - 1);
        const dots = ui.lives.querySelectorAll(".life");
        dots.forEach((d, i) => d.classList.toggle("lost", i >= game.lives));
        if (game.lives === 0) endGame();
      }

      // ── bursts ──
      function addBurst(x, y, z, color) {
        const parts = [];
        const n = 18;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2 + Math.random() * 0.4;
          const sp = 80 + Math.random() * 220;
          parts.push({
            x, y, z,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 60,
            vz: (Math.random() - 0.5) * 80,
            life: 0.7 + Math.random() * 0.3
          });
        }
        game.bursts.push({ parts, color });
      }

      function updateBursts(dt) {
        for (let i = game.bursts.length - 1; i >= 0; i--) {
          const b = game.bursts[i];
          let alive = false;
          for (const p of b.parts) {
            if (p.life <= 0) continue;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.z += p.vz * dt;
            p.vy += 380 * dt;
            p.life -= dt;
            if (p.life > 0) alive = true;
          }
          if (!alive) game.bursts.splice(i, 1);
        }
      }

      function drawBursts() {
        for (const b of game.bursts) {
          for (const p of b.parts) {
            if (p.life <= 0) continue;
            const scale = focal / (focal + p.z);
            const sx = centerX + (p.x - centerX) * scale;
            const sy = centerY + (p.y - centerY) * scale;
            ctx.fillStyle = `rgba(${b.color}, ${p.life})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function popScore(sx, sy, text, color) {
        const el = document.createElement("div");
        el.className = "floater";
        el.style.left = sx + "px";
        el.style.top = sy + "px";
        el.style.color = color;
        el.textContent = text;
        stage.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      // ── input ──
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        canvas.classList.add("dragging");
        const grabbed = findNearestParticle(e.clientX, e.clientY);
        const ptr = {
          id: e.pointerId,
          x: e.clientX, y: e.clientY,
          px: e.clientX, py: e.clientY,
          grabbed,
          offsetX: 0, offsetY: 0, offsetZ: 0
        };
        if (grabbed) {
          const q = project(grabbed);
          ptr.offsetX = q.x - e.clientX;
          ptr.offsetY = q.y - e.clientY;
          ptr.offsetZ = grabbed.z;
        }
        pointers.set(e.pointerId, ptr);
      });

      canvas.addEventListener("pointermove", (e) => {
        const ptr = pointers.get(e.pointerId);
        if (!ptr) return;
        ptr.px = ptr.x; ptr.py = ptr.y;
        ptr.x = e.clientX; ptr.y = e.clientY;
      });

      function release(e) {
        const ptr = pointers.get(e.pointerId);
        if (!ptr) return;
        pointers.delete(e.pointerId);
        if (pointers.size === 0) canvas.classList.remove("dragging");
      }

      canvas.addEventListener("pointerup", release);
      canvas.addEventListener("pointercancel", release);
      window.addEventListener("resize", resize);

      // ── game flow ──
      function start() {
        game.running = true;
        game.score = 0;
        game.combo = 0;
        game.lives = 3;
        game.stars = [];
        game.bursts = [];
        game.spawnTimer = 0;
        game.spawnInterval = 1.6;
        game.startTime = performance.now();
        ui.score.textContent = "0";
        ui.combo.textContent = "";
        ui.lives.querySelectorAll(".life").forEach(d => d.classList.remove("lost"));
        ui.overlay.classList.add("hidden");
      }

      function endGame() {
        game.running = false;
        ui.overlay.classList.remove("hidden");
        ui.overlay.querySelector("h1").textContent = "out";
        ui.overlay.querySelector("p").innerHTML = `final score<br/><span style="font-size:32px;color:var(--accent);letter-spacing:0.04em">${game.score}</span>`;
        ui.startBtn.textContent = "play again";
      }

      ui.startBtn.addEventListener("click", start);

      function tick(now) {
        const rawDt = (now - lastTime) / 1000 || 0.016;
        lastTime = now;
        const dt = Math.min(rawDt, 1/30);

        simulate(rawDt);

        updateStars(dt);
        updateBursts(dt);

        drawBackground();
        drawCloth();
        drawStars();
        drawBursts();

        requestAnimationFrame(tick);
      }

      resize();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
