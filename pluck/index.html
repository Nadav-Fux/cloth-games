<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>nVision · pluck</title>
  <style>
    :root {
      --bg-a: #08070d;
      --bg-b: #0e0c18;
      --bg-c: #050409;
      --text: #f4f3ef;
      --accent: #c4b5fd;
      --hot: #f0abfc;
      --good: #6ee7b7;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
    }

    #cloth {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }
    #cloth.dragging { cursor: grabbing; }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 8;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .hud .score {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }

    .hud .meta {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .timer {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 8;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 28px;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(8, 7, 13, 0.78);
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay h1 {
      margin: 0;
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .overlay p {
      margin: 0;
      max-width: 86vw;
      text-align: center;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.65;
      line-height: 1.7;
    }

    .overlay button {
      margin-top: 12px;
      padding: 14px 38px;
      background: transparent;
      border: 1px solid rgba(196, 181, 253, 0.55);
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      border-radius: 999px;
      cursor: pointer;
    }

    .overlay button:hover { background: rgba(196, 181, 253, 0.1); }

    .floater {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 7;
      font-family: ui-monospace, monospace;
      font-size: 14px;
      font-weight: 600;
      animation: floatUp 0.9s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, calc(-50% - 56px)) scale(1.4); }
    }
    .game-tabs { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 2px; padding: 3px 4px; background: rgba(0,0,0,0.45); border: 1px solid rgba(244,243,239,0.18); border-radius: 999px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    .game-tabs a { padding: 3px 8px; border-radius: 999px; color: rgba(244,243,239,0.65); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: background 0.15s ease, color 0.15s ease; }
    .game-tabs a:hover { color: #f2e9cf; background: rgba(244,243,239,0.08); }
    .game-tabs a.active { color: #0a0a0c; background: #f2e9cf; }
  </style>
</head>
<body>
  <nav class="game-tabs"><a href="../cloth/">cloth</a><a href="../slingshot/">slingshot</a><a href="../pluck/" class="active">pluck</a><a href="../catch/">catch</a></nav>
  <main class="stage">
    <canvas id="cloth"></canvas>
  </main>

  <div class="hud">
    <div class="score" id="score">0</div>
    <div class="meta" id="combo"></div>
  </div>

  <div class="timer" id="timer">60</div>

  <div class="overlay" id="overlay">
    <h1>pluck</h1>
    <p>glowing notes appear on the cloth.<br/>grab one, pull it past the ring, release fast.<br/>the snap pops the note.</p>
    <button id="startBtn">begin</button>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("cloth");
      const ctx = canvas.getContext("2d", { alpha: true, desynchronized: true });
      const stage = document.querySelector(".stage");
      const ui = {
        score: document.getElementById("score"),
        combo: document.getElementById("combo"),
        timer: document.getElementById("timer"),
        overlay: document.getElementById("overlay"),
        startBtn: document.getElementById("startBtn")
      };

      const DPR_LIMIT = 2;
      const COLS = 28;
      const ROWS = 28;
      const ITERATIONS = 4;
      const GRAVITY = 720;
      const DRAG = 0.992;
      const POINTER_RADIUS = 92;
      const STIFFNESS = 0.84;
      const PULL_THRESHOLD = 70; // px world distance from base to count
      const RELEASE_VELOCITY = 280; // particle velocity at release for pop

      let width = 1, height = 1, dpr = 1, focal = 880;
      let centerX = 0, centerY = 0;
      let restX = 25, restY = 20;
      let floorY = 1;
      let particles = [], constraints = [], projected = [];
      let lastTime = performance.now();

      const pointers = new Map();

      const game = {
        running: false,
        score: 0,
        combo: 0,
        timeLeft: 60,
        startTime: 0,
        notes: [],
        bursts: [],
        spawnTimer: 0,
        spawnInterval: 1.4
      };

      class Particle {
        constructor(x, y, z, col, row, pinned) {
          this.x = x; this.y = y; this.z = z;
          this.oldX = x; this.oldY = y; this.oldZ = z;
          this.baseX = x; this.baseY = y; this.baseZ = z;
          this.ax = 0; this.ay = 0; this.az = 0;
          this.col = col; this.row = row;
          this.pinned = pinned;
          this.pinX = x; this.pinY = y; this.pinZ = z;
        }
        addForce(x, y, z) { this.ax += x; this.ay += y; this.az += z; }
        integrate(dt) {
          if (this.pinned) {
            this.x = this.pinX; this.y = this.pinY; this.z = this.pinZ;
            this.oldX = this.x; this.oldY = this.y; this.oldZ = this.z;
            this.ax = 0; this.ay = 0; this.az = 0;
            return;
          }
          const vx = (this.x - this.oldX) * DRAG;
          const vy = (this.y - this.oldY) * DRAG;
          const vz = (this.z - this.oldZ) * DRAG;
          this.oldX = this.x; this.oldY = this.y; this.oldZ = this.z;
          this.x += vx + this.ax * dt * dt;
          this.y += vy + this.ay * dt * dt;
          this.z += vz + this.az * dt * dt;
          this.ax = 0; this.ay = 0; this.az = 0;
        }
      }

      class Constraint {
        constructor(a, b, rest, type) {
          this.a = a; this.b = b; this.rest = rest; this.type = type;
        }
        solve(stiffness) {
          const a = this.a, b = this.b;
          let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 0.0001;
          const tf = this.type === "bend" ? 0.42 : this.type === "shear" ? 0.72 : 1;
          const diff = ((dist - this.rest) / dist) * stiffness * tf;
          dx *= diff; dy *= diff; dz *= diff;
          const aF = !a.pinned, bF = !b.pinned;
          if (aF && bF) {
            a.x += dx*0.5; a.y += dy*0.5; a.z += dz*0.5;
            b.x -= dx*0.5; b.y -= dy*0.5; b.z -= dz*0.5;
          } else if (aF) {
            a.x += dx; a.y += dy; a.z += dz;
          } else if (bF) {
            b.x -= dx; b.y -= dy; b.z -= dz;
          }
        }
      }

      const idx = (c, r) => r * COLS + c;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, DPR_LIMIT);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        focal = Math.max(720, width * 0.86);
        centerX = width * 0.5;
        centerY = height * 0.12;
        buildCloth();
      }

      function buildCloth() {
        particles = []; constraints = []; projected = new Array(COLS * ROWS);
        const isMobile = width < 640;
        const topMargin = isMobile ? Math.max(20, height * 0.03) : Math.max(32, height * 0.05);
        const reserve = isMobile ? Math.max(80, height * 0.10) : Math.max(120, height * 0.16);
        const availH = height - topMargin - reserve;
        const clothWidth = isMobile ? width * 0.98 : Math.min(width * 0.92, 1060);
        const maxClothH = isMobile ? Math.max(700, height * 0.86) : Math.max(620, height * 0.78);
        const clothHeight = Math.max(220, Math.min(availH, maxClothH));
        restX = clothWidth / (COLS - 1);
        restY = clothHeight / (ROWS - 1);
        const startX = centerX - clothWidth * 0.5;
        const startY = topMargin;
        floorY = startY + clothHeight + 32;

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const u = c / (COLS - 1);
            const v = r / (ROWS - 1);
            const x = startX + c * restX;
            const y = startY + r * restY;
            const z = Math.sin(u * Math.PI * 2.4) * 16 * (0.25 + v);
            const pinned = r === 0 && (c % 2 === 0 || c === COLS - 1 || c === 0);
            particles.push(new Particle(x, y, z, c, r, pinned));
          }
        }

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const p = particles[idx(c, r)];
            if (c < COLS - 1) constraints.push(new Constraint(p, particles[idx(c+1, r)], restX, "structural"));
            if (r < ROWS - 1) constraints.push(new Constraint(p, particles[idx(c, r+1)], restY, "structural"));
            if (c < COLS - 1 && r < ROWS - 1) {
              const diag = Math.sqrt(restX*restX + restY*restY);
              constraints.push(new Constraint(p, particles[idx(c+1, r+1)], diag, "shear"));
              constraints.push(new Constraint(particles[idx(c+1, r)], particles[idx(c, r+1)], diag, "shear"));
            }
            if (c < COLS - 2) constraints.push(new Constraint(p, particles[idx(c+2, r)], restX*2, "bend"));
            if (r < ROWS - 2) constraints.push(new Constraint(p, particles[idx(c, r+2)], restY*2, "bend"));
          }
        }
      }

      function project(p) {
        const scale = focal / (focal + p.z);
        return {
          x: centerX + (p.x - centerX) * scale,
          y: centerY + (p.y - centerY) * scale,
          s: scale, z: p.z
        };
      }

      function screenToWorld(x, y, zRef) {
        const scale = focal / (focal + zRef);
        return {
          x: (x - centerX) / scale + centerX,
          y: (y - centerY) / scale + centerY,
          z: zRef
        };
      }

      function findNearestParticle(x, y) {
        let nearest = null;
        let best = POINTER_RADIUS * POINTER_RADIUS;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          if (p.pinned) continue;
          const q = project(p);
          const dx = q.x - x, dy = q.y - y;
          const d = dx*dx + dy*dy;
          if (d < best) { best = d; nearest = p; }
        }
        return nearest;
      }

      function applyForces(dt) {
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          p.addForce(0, GRAVITY, 0);
          const vx = p.x - p.oldX, vy = p.y - p.oldY, vz = p.z - p.oldZ;
          p.addForce(-vx * 0.014 / Math.max(dt, 0.001), -vy * 0.014 / Math.max(dt, 0.001), -vz * 0.014 / Math.max(dt, 0.001));
        }
      }

      function satisfyPointers() {
        for (const ptr of pointers.values()) {
          if (!ptr.grabbed) continue;
          const target = screenToWorld(ptr.x + ptr.offsetX, ptr.y + ptr.offsetY, ptr.offsetZ);
          const p = ptr.grabbed;
          const pull = 0.9;
          p.x += (target.x - p.x) * pull;
          p.y += (target.y - p.y) * pull;
          p.z += (target.z + (ptr.x - ptr.px) * 2.0 - p.z) * 0.4;
          const grabCol = p.col, grabRow = p.row;
          for (let r = Math.max(0, grabRow - 2); r <= Math.min(ROWS - 1, grabRow + 2); r++) {
            for (let c = Math.max(0, grabCol - 2); c <= Math.min(COLS - 1, grabCol + 2); c++) {
              const n = particles[idx(c, r)];
              if (n === p || n.pinned) continue;
              const dist = Math.hypot(c - grabCol, r - grabRow);
              const k = Math.max(0, 1 - dist / 3) * 0.18;
              n.x += (p.x - n.x) * k;
              n.y += (p.y - n.y) * k;
              n.z += (p.z - n.z) * k;
            }
          }
        }
      }

      function collide() {
        const minZ = -380, maxZ = 420;
        const leftBound = -restX, rightBound = width + restX;
        for (let i = 0; i < particles.length; i++) {
          const p = particles[i];
          if (p.y > floorY) {
            p.y = floorY;
            p.oldY = p.y + (p.oldY - p.y) * 0.34;
            p.oldX = p.x + (p.oldX - p.x) * 0.84;
          }
          if (p.z < minZ) { p.z = minZ; p.oldZ = p.z + (p.oldZ - p.z) * 0.4; }
          else if (p.z > maxZ) { p.z = maxZ; p.oldZ = p.z + (p.oldZ - p.z) * 0.4; }
          if (p.x < leftBound) { p.x = leftBound; p.oldX = p.x; }
          else if (p.x > rightBound) { p.x = rightBound; p.oldX = p.x; }
        }
      }

      function simulate(dt) {
        const fixedDt = Math.min(dt, 1/30);
        for (let step = 0; step < 2; step++) {
          const subDt = fixedDt * 0.5;
          applyForces(subDt);
          for (let i = 0; i < particles.length; i++) particles[i].integrate(subDt);
          satisfyPointers();
          for (let n = 0; n < ITERATIONS; n++) {
            for (let i = 0; i < constraints.length; i++) constraints[i].solve(STIFFNESS);
            satisfyPointers();
            collide();
          }
        }
      }

      function normalForCell(p00, p10, p01) {
        const ax = p10.x-p00.x, ay = p10.y-p00.y, az = p10.z-p00.z;
        const bx = p01.x-p00.x, by = p01.y-p00.y, bz = p01.z-p00.z;
        let nx = ay*bz - az*by, ny = az*bx - ax*bz, nz = ax*by - ay*bx;
        const len = Math.sqrt(nx*nx + ny*ny + nz*nz) || 1;
        return { x: nx/len, y: ny/len, z: nz/len };
      }

      function colorForCell(light, depth) {
        const shade = Math.max(0.2, Math.min(1, light * 0.6 + 0.5));
        const depthShade = Math.max(0.7, Math.min(1, 1 - depth * 0.0009));
        const k = shade * depthShade;
        const r = 26 + 130 * k;
        const g = 22 + 110 * k;
        const b = 48 + 200 * k;
        return `rgb(${r|0}, ${g|0}, ${b|0})`;
      }

      function drawBackground() {
        ctx.clearRect(0, 0, width, height);
        const bg = ctx.createLinearGradient(0, 0, width, height);
        bg.addColorStop(0, "#08070d");
        bg.addColorStop(0.55, "#0e0c18");
        bg.addColorStop(1, "#050409");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);
      }

      function drawCloth() {
        for (let i = 0; i < particles.length; i++) projected[i] = project(particles[i]);
        for (let r = 0; r < ROWS - 1; r++) {
          for (let c = 0; c < COLS - 1; c++) {
            const i00 = idx(c, r), i10 = idx(c+1, r), i11 = idx(c+1, r+1), i01 = idx(c, r+1);
            const p00 = particles[i00], p10 = particles[i10], p01 = particles[i01];
            const q00 = projected[i00], q10 = projected[i10], q11 = projected[i11], q01 = projected[i01];
            const n = normalForCell(p00, p10, p01);
            const light = n.x * -0.24 + n.y * -0.18 + n.z * 0.88;
            const depth = (p00.z + p10.z + particles[i11].z + p01.z) * 0.25;
            ctx.beginPath();
            ctx.moveTo(q00.x, q00.y);
            ctx.lineTo(q10.x, q10.y);
            ctx.lineTo(q11.x, q11.y);
            ctx.lineTo(q01.x, q01.y);
            ctx.closePath();
            ctx.fillStyle = colorForCell(light, depth);
            ctx.fill();
          }
        }
      }

      // ── notes (target points on the cloth) ──
      function spawnNote() {
        // pick a random non-pinned particle that isn't already a note
        const used = new Set(game.notes.map(n => n.particle));
        let attempts = 12;
        while (attempts-- > 0) {
          const c = 2 + Math.floor(Math.random() * (COLS - 4));
          const r = 4 + Math.floor(Math.random() * (ROWS - 6));
          const p = particles[idx(c, r)];
          if (p.pinned || used.has(p)) continue;
          game.notes.push({
            particle: p,
            charge: 0,
            life: 5.0,
            popped: false,
            pulse: Math.random() * Math.PI * 2
          });
          return;
        }
      }

      function updateNotes(dt) {
        for (let i = game.notes.length - 1; i >= 0; i--) {
          const n = game.notes[i];
          const p = n.particle;
          const dx = p.x - p.baseX, dy = p.y - p.baseY, dz = p.z - p.baseZ;
          const pull = Math.sqrt(dx*dx + dy*dy + dz*dz);
          n.charge = Math.min(1, pull / PULL_THRESHOLD);
          n.life -= dt;
          n.pulse += dt * 3;

          if (n.popped) {
            game.notes.splice(i, 1);
            continue;
          }
          if (n.life <= 0) {
            // miss
            game.combo = 0;
            ui.combo.textContent = "missed";
            const q = project(p);
            popScore(q.x, q.y, "miss", "#888");
            game.notes.splice(i, 1);
          }
        }

        game.spawnTimer += dt;
        if (game.spawnTimer >= game.spawnInterval && game.notes.length < 5) {
          game.spawnTimer = 0;
          spawnNote();
          // ramp difficulty
          game.spawnInterval = Math.max(0.7, game.spawnInterval * 0.99);
        }
      }

      function drawNotes() {
        for (const n of game.notes) {
          const p = n.particle;
          const q = project(p);
          const lifeAlpha = Math.min(1, n.life * 0.6);
          // outer ring (charge meter)
          const ringR = 28;
          ctx.save();
          ctx.lineWidth = 2;
          ctx.strokeStyle = `rgba(196, 181, 253, ${0.3 * lifeAlpha})`;
          ctx.beginPath();
          ctx.arc(q.x, q.y, ringR, 0, Math.PI * 2);
          ctx.stroke();

          // charge arc
          const a = -Math.PI / 2;
          const aEnd = a + Math.PI * 2 * n.charge;
          const chargeColor = n.charge >= 1 ? "#f0abfc" : "#c4b5fd";
          ctx.lineWidth = 3;
          ctx.strokeStyle = chargeColor;
          ctx.beginPath();
          ctx.arc(q.x, q.y, ringR, a, aEnd);
          ctx.stroke();

          // glowing core
          const pulse = 0.85 + 0.15 * Math.sin(n.pulse);
          const core = n.charge >= 1 ? 14 : 9;
          const halo = ctx.createRadialGradient(q.x, q.y, 0, q.x, q.y, 28);
          halo.addColorStop(0, `rgba(196, 181, 253, ${0.7 * pulse * lifeAlpha})`);
          halo.addColorStop(1, "rgba(196, 181, 253, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(q.x, q.y, 28, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = n.charge >= 1 ? "#f0abfc" : "#e9d5ff";
          ctx.beginPath();
          ctx.arc(q.x, q.y, core, 0, Math.PI * 2);
          ctx.fill();

          // life indicator (tiny tick)
          if (n.life < 2) {
            ctx.strokeStyle = `rgba(255, 100, 130, ${1 - n.life / 2})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(q.x, q.y, ringR + 6, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * (n.life / 2));
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      // ── bursts ──
      function addBurst(x, y, z, color) {
        const parts = [];
        const n = 22;
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2 + Math.random() * 0.4;
          const sp = 80 + Math.random() * 260;
          parts.push({
            x, y, z,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 60,
            vz: (Math.random() - 0.5) * 80,
            life: 0.7 + Math.random() * 0.4
          });
        }
        game.bursts.push({ parts, color });
      }

      function updateBursts(dt) {
        for (let i = game.bursts.length - 1; i >= 0; i--) {
          const b = game.bursts[i];
          let alive = false;
          for (const p of b.parts) {
            if (p.life <= 0) continue;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.z += p.vz * dt;
            p.vy += 380 * dt;
            p.life -= dt;
            if (p.life > 0) alive = true;
          }
          if (!alive) game.bursts.splice(i, 1);
        }
      }

      function drawBursts() {
        for (const b of game.bursts) {
          for (const p of b.parts) {
            if (p.life <= 0) continue;
            const scale = focal / (focal + p.z);
            const sx = centerX + (p.x - centerX) * scale;
            const sy = centerY + (p.y - centerY) * scale;
            ctx.fillStyle = `rgba(${b.color}, ${p.life})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function popScore(sx, sy, text, color) {
        const el = document.createElement("div");
        el.className = "floater";
        el.style.left = sx + "px";
        el.style.top = sy + "px";
        el.style.color = color;
        el.textContent = text;
        stage.appendChild(el);
        setTimeout(() => el.remove(), 900);
      }

      // ── input ──
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        canvas.classList.add("dragging");
        const grabbed = findNearestParticle(e.clientX, e.clientY);
        const ptr = {
          id: e.pointerId,
          x: e.clientX, y: e.clientY,
          px: e.clientX, py: e.clientY,
          grabbed,
          offsetX: 0, offsetY: 0, offsetZ: 0
        };
        if (grabbed) {
          const q = project(grabbed);
          ptr.offsetX = q.x - e.clientX;
          ptr.offsetY = q.y - e.clientY;
          ptr.offsetZ = grabbed.z;
        }
        pointers.set(e.pointerId, ptr);
      });

      canvas.addEventListener("pointermove", (e) => {
        const ptr = pointers.get(e.pointerId);
        if (!ptr) return;
        ptr.px = ptr.x; ptr.py = ptr.y;
        ptr.x = e.clientX; ptr.y = e.clientY;
      });

      function release(e) {
        const ptr = pointers.get(e.pointerId);
        if (!ptr) return;
        if (ptr.grabbed && game.running) {
          const p = ptr.grabbed;
          const dx = p.x - p.baseX, dy = p.y - p.baseY, dz = p.z - p.baseZ;
          const pull = Math.sqrt(dx*dx + dy*dy + dz*dz);

          // find note on or near this particle
          let bestNote = null, bestDist = Infinity;
          for (const n of game.notes) {
            if (n.popped) continue;
            const np = n.particle;
            const sd = Math.hypot(np.col - p.col, np.row - p.row);
            if (sd < bestDist && sd <= 2.5) { bestDist = sd; bestNote = n; }
          }

          if (bestNote && pull >= PULL_THRESHOLD) {
            // pop!
            const power = Math.min(2, pull / PULL_THRESHOLD);
            game.combo++;
            const mult = Math.min(5, 1 + Math.floor(game.combo / 3));
            const points = Math.round(50 * power * mult);
            game.score += points;
            ui.score.textContent = game.score;
            ui.combo.textContent = mult > 1 ? `×${mult}  · combo ${game.combo}` : `combo ${game.combo}`;
            bestNote.popped = true;
            const q = project(bestNote.particle);
            popScore(q.x, q.y, `+${points}`, "#f0abfc");
            addBurst(bestNote.particle.x, bestNote.particle.y, bestNote.particle.z, "240, 171, 252");
          } else if (pull < PULL_THRESHOLD && bestNote) {
            // partial pull, don't break combo
          }
        }
        pointers.delete(e.pointerId);
        if (pointers.size === 0) canvas.classList.remove("dragging");
      }

      canvas.addEventListener("pointerup", release);
      canvas.addEventListener("pointercancel", release);
      window.addEventListener("resize", resize);

      // ── game flow ──
      function start() {
        game.running = true;
        game.score = 0;
        game.combo = 0;
        game.timeLeft = 60;
        game.startTime = performance.now();
        game.notes = [];
        game.bursts = [];
        game.spawnTimer = 0;
        game.spawnInterval = 1.4;
        ui.score.textContent = "0";
        ui.combo.textContent = "";
        ui.overlay.classList.add("hidden");
        spawnNote();
        spawnNote();
      }

      function endGame() {
        game.running = false;
        ui.overlay.classList.remove("hidden");
        ui.overlay.querySelector("h1").textContent = "time";
        ui.overlay.querySelector("p").innerHTML = `final score<br/><span style="font-size:32px;color:var(--accent);letter-spacing:0.04em">${game.score}</span>`;
        ui.startBtn.textContent = "play again";
      }

      ui.startBtn.addEventListener("click", start);

      function tick(now) {
        const rawDt = (now - lastTime) / 1000 || 0.016;
        lastTime = now;
        const dt = Math.min(rawDt, 1/30);

        simulate(rawDt);

        if (game.running) {
          const elapsed = (now - game.startTime) / 1000;
          game.timeLeft = Math.max(0, 60 - elapsed);
          ui.timer.textContent = game.timeLeft.toFixed(1);
          updateNotes(dt);
          updateBursts(dt);
          if (game.timeLeft <= 0) endGame();
        }

        drawBackground();
        drawCloth();
        drawNotes();
        drawBursts();

        requestAnimationFrame(tick);
      }

      resize();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
